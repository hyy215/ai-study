<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 学习项目</title>
    <style>
        body {
            font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f7;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .project-list {
            list-style: none;
            padding: 0;
        }
        .project-item {
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .project-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .project-title {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .project-link {
            text-decoration: none;
            color: #007bff;
        }
        .project-desc {
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI 可视化演示</h1>
        <ul class="project-list">
            <li class="project-item">
                <div class="project-title">
                    <a href="sampling-viz/index.html" class="project-link">LLM 采样策略可视化</a>
                </div>
                <div class="project-desc">
                    Temperature, Top-K, 和 Top-P 采样策略的交互式可视化演示。
                </div>
            </li>
        </ul>
    </div>
</body>
</html>
